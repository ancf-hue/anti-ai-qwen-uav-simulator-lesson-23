<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Страница не найдена | Anti-AI Qwen</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Orbitron', monospace;
  background: radial-gradient(ellipse at center, #2a0a0a 0%, #1a0505 50%, #050000 100%);
  color: #ffcccc;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}
.error-code {
  font-size: 120px;
  font-weight: 900;
  background: linear-gradient(135deg, #ff3200, #ff6400, #ffaa00);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 30px rgba(255, 50, 0, 0.5);
  margin-bottom: 20px;
}
.error-title {
  font-size: 32px;
  color: #ffaa00;
  margin-bottom: 20px;
  text-shadow: 0 0 20px rgba(255, 170, 0, 0.8);
}
.error-desc {
  font-size: 16px;
  max-width: 600px;
  line-height: 1.6;
  margin-bottom: 40px;
}
.back-btn {
  padding: 16px 40px;
  background: linear-gradient(145deg, rgba(255, 50, 0, 0.85), rgba(200, 30, 0, 0.9));
  color: white;
  text-decoration: none;
  border-radius: 16px;
  font-weight: 900;
  font-size: 16px;
  letter-spacing: 2px;
  text-transform: uppercase;
  box-shadow: 0 6px 0 rgba(100, 20, 0, 0.8), 0 10px 20px rgba(0,0,0,0.4), 0 0 40px rgba(255, 50, 0, 0.5);
  transition: all 0.25s;
}
.back-btn:hover { transform: translateY(-3px); }
.back-btn:active { transform: translateY(3px); }
</style>
</head>
<body>
<div class="error-code">404</div>
<div class="error-title">🚁 Дрон потерян!</div>
<div class="error-desc">
  Страница не найдена. Возможно, она была сбита вражеским дроном или улетела в зону поражения.
</div>
<a href="/" class="back-btn">🏠 Вернуться в базу</a>
</body>
</html>
